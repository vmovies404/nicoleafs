<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - NicoLeaf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        
        .history-card {
            transition: all 0.3s ease;
        }
        .history-card:hover {
            transform: translateY(-4px);
        }
        
        .history-img {
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <nav class="bg-zinc-900 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🌿</div>
                <h1 class="heading text-4xl font-bold tracking-tighter text-emerald-400">NicoLeaf</h1>
            </div>
            <a href="/" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-600 text-black font-semibold rounded-3xl transition-all">
                New Analysis
            </a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-16">
        <h1 class="heading text-5xl font-bold mb-12">Analysis History</h1>
        
        {% if analyses %}
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for a in analyses %}
            <div class="history-card bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden">
                <img src="{{ url_for('static', filename='uploads/' + a.image_filename) }}" 
                     class="history-img w-full" alt="Leaf">
                <div class="p-6">
                    <div class="text-4xl font-bold text-emerald-400">{{ a.nicotine_level }}%</div>
                    <p class="text-zinc-400 text-sm">Nicotine Level</p>
                    <p class="text-xs text-zinc-500 mt-4">
                        {{ a.timestamp.strftime('%d %b %Y • %I:%M %p') }}
                    </p>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-32 text-zinc-400">
            <i class="fa-solid fa-folder-open text-7xl mb-6"></i>
            <p class="text-2xl">No analyses yet</p>
        </div>
        {% endif %}
    </div>
</body>
</html>

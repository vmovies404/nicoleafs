<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
        }

        
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .card {
            background: #222;
            padding: 10px;
            text-align: center;
        }

        img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        button {
            margin-top: 5px;
            background: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>History</h2>
<a href="/">Back</a>

<div class="grid">
    {% for a in analyses %}
    <div class="card">

        <!-- IMPORTANT FIX -->
        <img src="{{ url_for('uploaded_file', filename=a.image_filename) }}">

        <p>{{ a.nicotine_level }}%</p>

        <form action="{{ url_for('delete', id=a.id) }}" method="POST">
            <button>Delete</button>
        </form>

    </div>
    {% endfor %}
</div>

</body>
</html>

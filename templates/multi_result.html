<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .card {
            background: #222;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
        }

        img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<h2>Results</h2>

<a href="/">New Analysis</a> | 
<a href="/history">History</a>

<div class="grid">
    {% for a in analyses %}
    <div class="card">
        <img src="{{ url_for('uploaded_file', filename=a.image_filename) }}">
        <p>{{ a.nicotine_level }}%</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
